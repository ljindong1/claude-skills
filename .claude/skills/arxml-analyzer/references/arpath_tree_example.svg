  <path class="guide" d="M69 265 v5 h5"/>
  <text x="86" y="276" class="row">FlsGeneral</text>
  <text x="662" y="276" text-anchor="end" class="cnt">member 49 · ref 1</text>

  <!-- r7 FlsPublishedInformation (grey file) -->
  <path class="glyph" d="M62 297 h7 l5 5 v9 q0 1.5 -1.5 1.5 h-9 q-1.5 0 -1.5 -1.5 v-12.5 q0 -1.5 1.5 -1.5 z" fill="rgb(247,246,244)" stroke="rgb(180,178,170)"/>
  <path class="guide" d="M69 297 v5 h5"/>
  <text x="86" y="308" class="row">FlsPublishedInformation</text>
  <text x="662" y="308" text-anchor="end" class="cnt">member 10</text>

  <!-- r8 CommonPublishedInformation (grey file) -->
  <path class="glyph" d="M62 329 h7 l5 5 v9 q0 1.5 -1.5 1.5 h-9 q-1.5 0 -1.5 -1.5 v-12.5 q0 -1.5 1.5 -1.5 z" fill="rgb(247,246,244)" stroke="rgb(180,178,170)"/>
  <path class="guide" d="M69 329 v5 h5"/>
  <text x="86" y="340" class="row">CommonPublishedInformation</text>
  <text x="662" y="340" text-anchor="end" class="cnt">member 9</text>

  <!-- legend -->
  <path class="glyph" d="M20 368 q0 -3 3 -3 h5 l2 2 h5 q3 0 3 3 v6 q0 3 -3 3 h-15 q-3 0 -3 -3 z" fill="rgb(225,245,238)" stroke="rgb(15,110,86)"/>
  <text x="44" y="376" class="leg">MODULE-DEF 루트</text>
  <path class="glyph" d="M170 368 q0 -3 3 -3 h5 l2 2 h5 q3 0 3 3 v6 q0 3 -3 3 h-15 q-3 0 -3 -3 z" fill="rgb(230,241,251)" stroke="rgb(24,95,165)"/>
  <text x="194" y="376" class="leg">하위(sub/ref) 가진 컨테이너</text>
  <path class="glyph" d="M390 361 h7 l5 5 v9 q0 1.5 -1.5 1.5 h-9 q-1.5 0 -1.5 -1.5 v-12.5 q0 -1.5 1.5 -1.5 z" fill="rgb(247,246,244)" stroke="rgb(180,178,170)"/>
  <text x="412" y="376" class="leg">멤버만 있는 평면 컨테이너</text>

  <path class="glyph" d="M98 140 q0 -3 3 -3 h5 l2 2 h5 q3 0 3 3 v6 q0 3 -3 3 h-15 q-3 0 -3 -3 z" fill="rgb(230,241,251)" stroke="rgb(24,95,165)"/>
  <text x="122" y="148" class="row" fill="rgb(12,68,124)">FlsInternalDriver</text>
  <text x="662" y="148" text-anchor="end" class="cnt">sub 1 (내부 C40)</text>


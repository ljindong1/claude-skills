<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Fls 정의(.epd) AR-PATH 폴더 트리 (depth 3)</title>
  <desc>MODULE-DEF Fls 아래 최상위 컨테이너 5개와 FlsConfigSet의 하위 3개를 파일 탐색기식 폴더 트리로 표현하며, 각 노드에 member/ref/sub 개수를 표기한다.</desc>

  <style>
    text { font-family: "Anthropic Sans", "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans CJK KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: rgb(20,20,19); }
    .h1 { font-size: 19px; font-weight: 600; }
    .sub { font-size: 13px; font-weight: 400; fill: rgb(115,114,108); }
    .row { font-size: 14px; font-weight: 500; }
    .cnt { font-size: 13px; font-weight: 400; fill: rgb(140,138,130); }
    .leg { font-size: 12px; font-weight: 400; fill: rgb(115,114,108); }
    .glyph { stroke-width: 0.5; }
    .guide { stroke: rgb(180,178,170); stroke-width: 1; fill: none; }
  </style>

  <text x="20" y="30" class="h1">Fls 정의(.epd) — AR-PATH 폴더 트리</text>
  <text x="20" y="50" class="sub">MODULE-DEF → CONTAINER-DEF → SUB-CONTAINER (depth 3) · 숫자 = member · ref · sub</text>

  <!-- guide lines -->
  <!-- root(L0) vertical to its last L1 child (r8=336) -->
  <path class="guide" d="M37 90 V336"/>
  <path class="guide" d="M37 112 H60"/>
  <path class="guide" d="M37 240 H60"/>
  <path class="guide" d="M37 272 H60"/>
  <path class="guide" d="M37 304 H60"/>
  <path class="guide" d="M37 336 H60"/>
  <!-- FlsConfigSet(L1) vertical to its last L2 child (r4=208) -->
  <path class="guide" d="M71 124 V208"/>
  <path class="guide" d="M71 144 H96"/>
  <path class="guide" d="M71 176 H96"/>
  <path class="guide" d="M71 208 H96"/>

  <!-- r0 Fls (mint folder) -->
  <path class="glyph" d="M28 76 q0 -3 3 -3 h5 l2 2 h5 q3 0 3 3 v6 q0 3 -3 3 h-15 q-3 0 -3 -3 z" fill="rgb(225,245,238)" stroke="rgb(15,110,86)"/>
  <text x="52" y="84" class="row" fill="rgb(8,80,65)">Fls</text>
  <text x="92" y="84" class="sub" fill="rgb(15,110,86)">MODULE-DEF · refines /AUTOSAR/EcucDefs/Fls</text>

  <!-- r1 FlsConfigSet (blue folder) -->
  <path class="glyph" d="M62 108 q0 -3 3 -3 h5 l2 2 h5 q3 0 3 3 v6 q0 3 -3 3 h-15 q-3 0 -3 -3 z" fill="rgb(230,241,251)" stroke="rgb(24,95,165)"/>
  <text x="86" y="116" class="row" fill="rgb(12,68,124)">FlsConfigSet</text>
  <text x="662" y="116" text-anchor="end" class="cnt">member 22 · sub 3</text>

